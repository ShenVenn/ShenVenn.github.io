<!DOCTYPE html>
<html>
<head>
  <title>App 1</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #121212;
      color: white;
    }

    .top {
      display: flex;
      padding: 20px;
    }

    .top img {
      width: 100px;
      border-radius: 20px;
      margin-right: 15px;
    }

    .info h1 {
      margin: 0;
    }

    .btn {
      margin-top: 10px;
      display: inline-block;
      padding: 10px 20px;
      background: #00c853;
      border-radius: 10px;
      color: white;
      text-decoration: none;
    }

    .section {
      padding: 20px;
    }

    .images {
      display: flex;
      overflow-x: auto;
    }

    .images img {
      width: 200px;
      margin-right: 10px;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<div class="top">
  <img src="https://via.placeholder.com/100">
  <div class="info">
    <h1>App 1</h1>
    <p>Nhà phát hành: Anh 😏</p>
    <a class="btn" href="https://drive.google.com/uc?export=download&id=FILE_ID">
      Cài đặt
    </a>
  </div>
</div>

<div class="section">
  <h2>Giới thiệu</h2>
  <p>
    Đây là app siêu xịn, dùng cực mượt 😎
  </p>
</div>

<div class="section">
  <h2>Ảnh ứng dụng</h2>
  <div class="images">
    <img src="https://via.placeholder.com/200x350">
    <img src="https://via.placeholder.com/200x350">
    <img src="https://via.placeholder.com/200x350">
  </div>
</div>

<div class="section">
  <h2>Hướng dẫn</h2>
  <p>
    1. Tải app  
    2. Cài đặt  
    3. Mở lên và dùng  
  </p>
</div>

</body>
</html>
