```html
<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>App Store Style</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #000;
  color: white;
  display: flex;
}

/* ===== SIDEBAR ===== */
.sidebar {
  width: 230px;
  background: #0b0b0b;
  padding: 20px;
  height: 100vh;
}

.sidebar p { color: #aaa; margin: 12px 0; }

/* ===== MAIN ===== */
.main {
  flex: 1;
  overflow-y: auto;
}

/* ===== HERO ===== */
.hero {
  position: relative;
  padding: 40px 45px;
  height: 200px;
  overflow: hidden;
  background: radial-gradient(ellipse at center, #0a0a0a 0%, #000 70%);
}

.hero-bg {
  position: absolute;
  inset: 0;
  background-size: cover;
  background-position: center;
  filter: blur(120px) saturate(180%) brightness(1.2);
  transform: scale(1.8);
  opacity: 0.9;
}

/* ===== CONTENT ===== */
.hero-content {
  position: relative;
  z-index: 2;
  display: flex;
  align-items: center;
  gap: 40px;
  height: 100%;
}

/* ===== ICON ===== */
.icon {
  width: 200px;
  height: 200px;
  border-radius: 40px;
  overflow: hidden;
  background: #000;
}

.icon img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* ===== TEXT ===== */
.info h1 {
  font-size: 34px;
  margin: 0;
}

.sub { color: #bbb; margin-top: 6px; }

.get-btn {
  margin-top: 18px;
  background: #007aff;
  padding: 10px 28px;
  border-radius: 20px;
  display: inline-block;
}

/* ===== PREVIEW ===== */
.preview {
  padding: 30px 100px;
  overflow: hidden;
}

.slider-wrapper {
  position: relative;
  overflow: visible;
}

/* fade 2 bên */
.slider-wrapper::before,
.slider-wrapper::after {
  content: "";
  position: absolute;
  top: 0;
  bottom: 0;
  width: 120px;
  z-index: 2;
  pointer-events: none;
}

.slider-wrapper::before {
  left: 0;
  background: linear-gradient(to right, #000, transparent);
}

.slider-wrapper::after {
  right: 0;
  background: linear-gradient(to left, #000, transparent);
}

.slider {
  display: flex;
  gap: 20px;
  transition: transform 0.4s ease;
}

.slider img {
  width: calc((100% - 40px) / 3);
  aspect-ratio: 16/9;
  border-radius: 20px;
  object-fit: cover;
  flex-shrink: 0;
}

/* ===== NÚT ===== */
.nav {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  z-index: 3;

  width: 34px;
  height: 70px;
  border-radius: 12px;
  border: none;

  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(10px);
  color: white;
  cursor: pointer;

  opacity: 0;
  transition: 0.25s;
}

.nav.left { left: -60px; }
.nav.right { right: -60px; }

.slider-wrapper:hover .nav {
  opacity: 1;
}

.nav:hover {
  background: rgba(255,255,255,0.2);
}
</style>
</head>

<body>

<div class="sidebar">
  <p>App Store</p>
  <p>Today</p>
  <p>Games</p>
  <p>Apps</p>
</div>

<div class="main">

<div class="hero">
  <div class="hero-bg" id="heroBg"></div>

  <div class="hero-content">
    <div class="icon">
      <img id="appIcon" src="https://i.ibb.co/G38YxKhh/windows-defender-off.png">
    </div>

    <div class="info">
      <h1 id="appName">Windows Defender</h1>
      <div class="sub">Utility</div>
      <div class="get-btn">GET</div>
    </div>
  </div>
</div>

<div class="preview">
  <div class="slider-wrapper">

    <button class="nav left" onclick="slide(-1)">❮</button>

    <div class="slider" id="slider">
      <img src="https://i.ibb.co/G38YxKhh/windows-defender-off.png">
      <img src="https://i.ibb.co/G38YxKhh/windows-defender-off.png">
      <img src="https://i.ibb.co/G38YxKhh/windows-defender-off.png">
      <img src="https://i.ibb.co/G38YxKhh/windows-defender-off.png">
      <img src="https://i.ibb.co/G38YxKhh/windows-defender-off.png">
    </div>

    <button class="nav right" onclick="slide(1)">❯</button>

  </div>
</div>

</div>

<script>
function setApp(icon, name) {
  document.getElementById("appIcon").src = icon;
  document.getElementById("appName").innerText = name;
  document.getElementById("heroBg").style.backgroundImage = `url(${icon})`;
}

setApp("https://i.ibb.co/G38YxKhh/windows-defender-off.png", "Windows Defender");

let index = 0;

function slide(direction) {
  const slider = document.getElementById("slider");
  const total = slider.children.length;

  index += direction;

  if (index < 0) index = 0;
  if (index > total - 3) index = total - 3;

  const width = slider.children[0].offsetWidth + 20;
  slider.style.transform = `translateX(-${index * width}px)`;
}
</script>

</body>
</html>
```
