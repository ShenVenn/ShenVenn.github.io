<!DOCTYPE html>
<html>
<head>
  <title>Play Together</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #121212;
      color: white;
    }

    .banner {
      padding: 30px;
      background: linear-gradient(to right, #ff512f, #dd2476);
    }

    .top {
      display: flex;
      align-items: center;
    }

    .top img {
      width: 100px;
      border-radius: 20px;
      margin-right: 20px;
    }

    .info h1 {
      margin: 0;
    }

    .btn {
      margin-top: 10px;
      display: inline-block;
      padding: 10px 20px;
      background: #00c853;
      border-radius: 10px;
      color: white;
      text-decoration: none;
    }

    .stats {
      display: flex;
      justify-content: space-around;
      padding: 20px;
      background: #1f1f1f;
      text-align: center;
    }

    .section {
      padding: 20px;
    }

    .images {
      display: flex;
      overflow-x: auto;
    }

    .images img {
      width: 250px;
      margin-right: 10px;
      border-radius: 15px;
    }
  </style>
</head>

<body>

<!-- Banner -->
<div class="banner">
  <div class="top">
    <img src="https://via.placeholder.com/100">
    <div class="info">
      <h1>Play Together</h1>
      <p>Nhà phát hành: VNG 😏</p>
      <a class="btn" href="https://drive.google.com/uc?export=download&id=1L3PDINlcK2RRo5VJCX2LkIqQu9k9b4QM">
        Cài đặt
      </a>
    </div>
  </div>
</div>

<!-- Thông tin -->
<div class="stats">
  <div>
    <h3>4.5 ⭐</h3>
    <p>Đánh giá</p>
  </div>
  <div>
    <h3>13+</h3>
    <p>Tuổi</p>
  </div>
  <div>
    <h3>2GB</h3>
    <p>Dung lượng</p>
  </div>
</div>

<!-- Ảnh -->
<div class="section">
  <h2>📸 Ảnh ứng dụng</h2>
  <div class="images">
    <img src="https://via.placeholder.com/250x450">
    <img src="https://via.placeholder.com/250x450">
    <img src="https://via.placeholder.com/250x450">
  </div>
</div>

<!-- Mô tả -->
<div class="section">
  <h2>📖 Giới thiệu</h2>
  <p>
    Đây là game siêu vui 😏 chơi cùng bạn bè khắp thế giới.
  </p>
</div>

<!-- Hướng dẫn -->
<div class="section">
  <h2>📥 Hướng dẫn</h2>
  <p>
    1. Bấm tải  
    2. Cài đặt  
    3. Mở game  
  </p>
</div>

</body>
</html>
