<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>App Store Clone</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #000;
  color: white;
  display: flex;
}

/* ===== SIDEBAR ===== */
.sidebar {
  width: 220px;
  background: #0d0d0d;
  height: 100vh;
  padding: 20px;
  box-sizing: border-box;
}

.sidebar h2 {
  font-size: 18px;
  margin-bottom: 20px;
}

.sidebar p {
  color: #aaa;
  margin: 10px 0;
  cursor: pointer;
}

/* ===== MAIN ===== */
.main {
  flex: 1;
}

/* ===== BANNER ===== */
.banner {
  padding: 40px;
  background: linear-gradient(120deg, #ff512f, #dd2476, #1e3c72);
}

.top {
  display: flex;
  align-items: center;
  gap: 20px;
}

.top img {
  width: 150px;
  height: 150px;
  border-radius: 30px;
  object-fit: cover;
}

.info h1 {
  margin: 0;
  font-size: 34px;
}

.info p {
  margin: 5px 0;
  color: #ddd;
}

.btn {
  margin-top: 10px;
  padding: 10px 25px;
  background: #007aff;
  border-radius: 20px;
  display: inline-block;
}

/* ===== STATS ===== */
.stats {
  display: flex;
  justify-content: space-around;
  padding: 20px;
  background: #111;
}

.stats div {
  text-align: center;
}

.stats p {
  color: #aaa;
}

/* ===== PREVIEW ===== */
.section {
  padding: 20px;
}

.images {
  display: flex;
  gap: 20px;
  overflow-x: auto;
}

.images img {
  width: 320px;
  height: 180px;
  border-radius: 20px;
  object-fit: cover;
}

/* scroll đẹp */
.images::-webkit-scrollbar {
  display: none;
}
</style>
</head>

<body>

<!-- ===== SIDEBAR ===== -->
<div class="sidebar">
  <h2>📱 App Store</h2>
  <p>Today</p>
  <p>Games</p>
  <p>Apps</p>
  <p>Arcade</p>
  <hr>
  <p>Categories</p>
  <p>Photo & Video</p>
  <p>Entertainment</p>
</div>

<!-- ===== MAIN ===== -->
<div class="main">

  <!-- Banner -->
  <div class="banner">
    <div class="top">
      <img src="https://i.ibb.co/G38YxKhh/windows-defender-off.png">

      <div class="info">
        <h1>Play Together VNG</h1>
        <p>Simulation</p>
        <p>Free · In-App Purchases</p>
        <div class="btn">GET</div>
      </div>
    </div>
  </div>

  <!-- Stats -->
  <div class="stats">
    <div>
      <h3>4.1 ⭐</h3>
      <p>545K Ratings</p>
    </div>
    <div>
      <h3>13+</h3>
      <p>Age</p>
    </div>
    <div>
      <h3>Simulation</h3>
      <p>Category</p>
    </div>
    <div>
      <h3>VNG</h3>
      <p>Developer</p>
    </div>
    <div>
      <h3>EN</h3>
      <p>Language</p>
    </div>
    <div>
      <h3>2.4GB</h3>
      <p>Size</p>
    </div>
  </div>

  <!-- Preview -->
  <div class="section">
    <div class="images">
      <img src="https://i.ibb.co/G38YxKhh/windows-defender-off.png">
      <img src="https://i.ibb.co/G38YxKhh/windows-defender-off.png">
      <img src="https://i.ibb.co/G38YxKhh/windows-defender-off.png">
    </div>
  </div>

</div>

</body>
</html>
