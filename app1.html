<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>App Store Style</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #000;
  color: white;
  display: flex;
}

/* ===== SIDEBAR ===== */
.sidebar {
  width: 230px;
  background: #0b0b0b;
  padding: 20px;
  height: 100vh;
}

.sidebar h2 { font-size: 16px; }
.sidebar p { color: #aaa; margin: 12px 0; }

/* ===== MAIN ===== */
.main {
  flex: 1;
  overflow-y: auto;
}

/* ===== HERO ===== */
.hero {
  padding: 60px;
  background: linear-gradient(120deg, #1a1a1a, #000);
}

.hero-content {
  display: flex;
  align-items: center;
  gap: 30px;
}

/* ===== ICON STYLE TIKTOK ===== */
.icon {
  width: 180px;
  height: 180px;
  border-radius: 40px;
  position: relative;
  overflow: hidden;
  background: #000;

  /* chiều sâu */
  box-shadow:
    0 25px 60px rgba(0,0,0,0.6),
    0 0 20px rgba(255,255,255,0.05);
}

.icon img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* ✨ lớp kính */
.icon::before {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: 40px;
  pointer-events: none;

  background: linear-gradient(
    145deg,
    rgba(255,255,255,0.35) 0%,
    rgba(255,255,255,0.12) 25%,
    transparent 45%,
    transparent 60%,
    rgba(255,255,255,0.08) 75%,
    rgba(255,255,255,0.2) 100%
  );
}

/* ✨ viền kính */
.icon::after {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: 40px;
  pointer-events: none;

  box-shadow:
    inset 0 0 0 1px rgba(255,255,255,0.5),
    inset 0 2px 6px rgba(255,255,255,0.25),
    inset 0 -3px 8px rgba(0,0,0,0.4);
}

/* ===== TEXT ===== */
.info h1 {
  font-size: 34px;
  margin: 0;
}

.sub {
  color: #bbb;
  margin-top: 6px;
}

.get-btn {
  margin-top: 18px;
  display: inline-block;
  background: #007aff;
  padding: 10px 28px;
  border-radius: 20px;
  font-weight: 600;
}

/* ===== INFO BAR ===== */
.info-bar {
  display: flex;
  gap: 60px;
  padding: 25px 60px;
  background: #0a0a0a;
  border-top: 1px solid rgba(255,255,255,0.05);
}

.info-box small {
  color: #777;
  font-size: 11px;
}

.info-box h3 {
  margin: 6px 0 0;
  font-size: 18px;
}

/* ===== PREVIEW ===== */
.preview {
  padding: 30px 60px;
}

.slider {
  display: flex;
  gap: 20px;
  overflow-x: auto;
}

.slider::-webkit-scrollbar { display: none; }

.slider img {
  width: 260px;
  height: 520px;
  border-radius: 30px;
  object-fit: cover;
}

/* ===== DESC ===== */
.desc {
  padding: 0 60px 40px;
  color: #ccc;
  line-height: 1.6;
}
</style>
</head>

<body>

<div class="sidebar">
  <h2>App Store</h2>
  <p>Today</p>
  <p>Games</p>
  <p>Apps</p>
  <p>Arcade</p>
  <hr>
  <p>Categories</p>
  <p>Entertainment</p>
</div>

<div class="main">

  <div class="hero">
    <div class="hero-content">

      <div class="icon">
        <img src="https://i.ibb.co/1fzpC5N3/vecto-tiktok-scaled.jpg">
      </div>

      <div class="info">
        <h1>Play Together VNG</h1>
        <div class="sub">Simulation</div>
        <div class="sub">Free · In-App Purchases</div>
        <div class="get-btn">GET</div>
      </div>

    </div>
  </div>

  <div class="info-bar">
    <div class="info-box"><small>RATINGS</small><h3>4.1 ★</h3></div>
    <div class="info-box"><small>AGE</small><h3>13+</h3></div>
    <div class="info-box"><small>CATEGORY</small><h3>Simulation</h3></div>
    <div class="info-box"><small>DEVELOPER</small><h3>VNG</h3></div>
    <div class="info-box"><small>LANGUAGE</small><h3>EN</h3></div>
    <div class="info-box"><small>SIZE</small><h3>2.4 GB</h3></div>
  </div>

  <div class="preview">
    <div class="slider">
      <img src="https://i.ibb.co/G38YxKhh/windows-defender-off.png">
      <img src="https://i.ibb.co/G38YxKhh/windows-defender-off.png">
      <img src="https://i.ibb.co/G38YxKhh/windows-defender-off.png">
    </div>
  </div>

  <div class="desc">
    Gặp gỡ bạn bè khắp nơi 🌍<br><br>
    Đây là thế giới ảo nơi bạn có thể chơi cùng mọi người...
  </div>

</div>

</body>
</html>
