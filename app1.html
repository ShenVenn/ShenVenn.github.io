<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>App Store Style</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #000;
  color: white;
  display: flex;
}

/* ===== SIDEBAR ===== */
.sidebar {
  width: 230px;
  background: #0b0b0b;
  padding: 20px;
  height: 100vh;
}

.sidebar h2 { font-size: 16px; }
.sidebar p { color: #aaa; margin: 12px 0; }

/* ===== MAIN ===== */
.main {
  flex: 1;
  overflow-y: auto;
}

/* ===== HERO ===== */
/* ===== HERO ===== */
/* ===== HERO ===== */
.hero {
  position: relative;
  padding: 40px 60px;
  overflow: hidden;

  height: 200px;

  /* nền đen sâu */
  background: radial-gradient(
    ellipse at center,
    #0a0a0a 0%,
    #000 70%
  );
}

/* ===== BLUR NỀN ===== */
.hero-bg {
  background-blend-mode: screen;
  opacity: 1;
  position: absolute;
  inset: 0;

  background-size: cover;
  background-position: center;

  /* 👇 màu rõ + glow mạnh */
  filter: blur(120px) saturate(250%) brightness(1.3);
  transform: scale(1.6);
  opacity: 1;

  /* fade ra 4 phía */
  -webkit-mask-image: radial-gradient(
    ellipse at center,
    black 40%,
    rgba(0,0,0,0.4) 65%,
    transparent 85%
  );
  mask-image: radial-gradient(
    ellipse at center,
    black 40%,
    rgba(0,0,0,0.4) 65%,
    transparent 85%
  );
}

/* ===== OVERLAY ĐEN ===== */
.hero::before {
  content: "";
  position: absolute;
  inset: 0;

  background: linear-gradient(
    to right,
    rgba(0,0,0,0.6) 0%,
    rgba(0,0,0,0.25) 30%,
    rgba(0,0,0,0.05) 55%,
    rgba(0,0,0,0.2) 75%,
    rgba(0,0,0,0.6) 100%
  );

  z-index: 1;
}

/* ===== ÁNH SÁNG (QUAN TRỌNG NHẤT) ===== */
.hero::after {
  content: "";
  position: absolute;
  inset: 0;

  background: radial-gradient(
    circle at 35% 50%, /* 👈 focus vào logo */
    rgba(255,255,255,0.18),
    rgba(255,255,255,0.08) 30%,
    transparent 60%
  );

  z-index: 1;
}

/* ===== CONTENT ===== */
.hero-content {
  position: relative;
  z-index: 2;

  display: flex;
  align-items: center;
  gap: 30px;
  height: 100%;
}

/* ===== ICON KÍNH ===== */
.icon {
  width: 180px;
  height: 180px;
  border-radius: 40px;
  position: relative;
  overflow: hidden;
  background: #000;

  box-shadow:
    0 25px 60px rgba(0,0,0,0.6),
    0 0 20px rgba(255,255,255,0.05);
}

.icon img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* lớp kính */
.icon::before {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: 40px;

  background: linear-gradient(
    145deg,
    rgba(255,255,255,0.35),
    transparent 40%,
    rgba(255,255,255,0.1)
  );
}

/* viền kính */
.icon::after {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: 40px;

  box-shadow:
    inset 0 0 0 1px rgba(255,255,255,0.5),
    inset 0 2px 6px rgba(255,255,255,0.25),
    inset 0 -3px 8px rgba(0,0,0,0.4);
}

/* ===== TEXT ===== */
.info h1 {
  font-size: 34px;
  margin: 0;
}

.sub {
  color: #bbb;
  margin-top: 6px;
}

.get-btn {
  margin-top: 18px;
  display: inline-block;
  background: #007aff;
  padding: 10px 28px;
  border-radius: 20px;
  font-weight: 600;
}

/* ===== INFO BAR ===== */
.info-bar {
  display: flex;
  gap: 60px;
  padding: 25px 60px;
  background: #0a0a0a;
  border-top: 1px solid rgba(255,255,255,0.05);
}

.info-box small {
  color: #777;
  font-size: 11px;
}

.info-box h3 {
  margin: 6px 0 0;
  font-size: 18px;
}

/* ===== PREVIEW ===== */
.preview {
  padding: 30px 60px;
}

.slider {
  display: flex;
  gap: 20px;
  overflow-x: auto;
}

.slider::-webkit-scrollbar { display: none; }

.slider img {
  width: 260px;
  height: 520px;
  border-radius: 30px;
  object-fit: cover;
}

/* ===== DESC ===== */
.desc {
  padding: 0 60px 40px;
  color: #ccc;
  line-height: 1.6;
}
</style>
</head>

<body>

<div class="sidebar">
  <h2>App Store</h2>
  <p>Today</p>
  <p>Games</p>
  <p>Apps</p>
  <p>Arcade</p>
  <hr>
  <p>Categories</p>
  <p>Entertainment</p>
</div>

<div class="main">

  <!-- HERO -->
  <div class="hero">
    <div class="hero-bg" id="heroBg"></div>

    <div class="hero-content">

      <div class="icon">
        <img id="appIcon" src="https://i.ibb.co/1fzpC5N3/vecto-tiktok-scaled.jpg">
      </div>

      <div class="info">
        <h1 id="appName">TikTok</h1>
        <div class="sub">Simulation</div>
        <div class="sub">Free · In-App Purchases</div>
        <div class="get-btn">GET</div>
      </div>

    </div>
  </div>

  <!-- INFO -->
  <div class="info-bar">
    <div class="info-box"><small>RATINGS</small><h3>4.1 ★</h3></div>
    <div class="info-box"><small>AGE</small><h3>13+</h3></div>
    <div class="info-box"><small>CATEGORY</small><h3>Simulation</h3></div>
    <div class="info-box"><small>DEVELOPER</small><h3>VNG</h3></div>
    <div class="info-box"><small>LANGUAGE</small><h3>EN</h3></div>
    <div class="info-box"><small>SIZE</small><h3>2.4 GB</h3></div>
  </div>

  <!-- PREVIEW -->
  <div class="preview">
    <div class="slider">
      <img src="https://i.ibb.co/G38YxKhh/windows-defender-off.png">
      <img src="https://i.ibb.co/G38YxKhh/windows-defender-off.png">
      <img src="https://i.ibb.co/G38YxKhh/windows-defender-off.png">
    </div>
  </div>

  <!-- DESC -->
  <div class="desc">
    Gặp gỡ bạn bè khắp nơi 🌍<br><br>
    Đây là thế giới ảo nơi bạn có thể chơi cùng mọi người...
  </div>

</div>

<script>
function setApp(icon, name) {
  document.getElementById("appIcon").src = icon;
  document.getElementById("appName").innerText = name;

  const bg = document.getElementById("heroBg");
  bg.style.backgroundImage = `url(${icon})`;
}

/* load mặc định */
setApp("https://i.ibb.co/1fzpC5N3/vecto-tiktok-scaled.jpg", "TikTok");
</script>

</body>
</html>
