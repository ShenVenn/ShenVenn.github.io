<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>App Store Style</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #000;
  color: white;
  display: flex;
}

/* ===== SIDEBAR ===== */
.sidebar {
  width: 230px;
  background: #0b0b0b;
  padding: 20px;
  height: 100vh;
}

.sidebar h2 { font-size: 16px; }
.sidebar p { color: #aaa; margin: 12px 0; }

/* ===== MAIN ===== */
.main {
  flex: 1;
  overflow-y: auto;
  overflow-x: visible; 
}

/* ===== HERO ===== */
.hero {
  position: relative;
  padding: 40px 45px;
  overflow: hidden;
  height: 200px;
  background: radial-gradient( ellipse at center, #0a0a0a 0%, #000 70% );
}

.hero-bg {
  position: absolute;
  inset: 0;
  background-size: cover;
  background-position: center;
  filter: blur(120px) saturate(180%) brightness(1.2);
  transform: scale(1.8);
  opacity: 0.9;
  -webkit-mask-image: radial-gradient( ellipse at center, black 45%, rgba(0,0,0,0.5) 65%, transparent 90% );
}

.hero::before {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(to right, rgba(0,0,0,0.5), rgba(0,0,0,0.15), rgba(0,0,0,0.05), rgba(0,0,0,0.2), rgba(0,0,0,0.5));
  z-index: 1;
}

.hero-content {
  position: relative;
  z-index: 2;
  display: flex;
  align-items: center;
  gap: 40px;
  height: 100%;
}

.icon {
  width: 200px;
  height: 200px;
  border-radius: 40px;
  overflow: hidden;
}

.icon img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.info h1 { font-size: 34px; margin: 0; }
.sub { color: #bbb; margin-top: 6px; }

.get-btn {
  margin-top: 18px;
  background: #007aff;
  padding: 10px 28px;
  border-radius: 20px;
  display: inline-block;
}

/* ===== PREVIEW ===== */
.preview {
  position: relative;
  padding: 30px 0;
}

.slider-wrapper {
  overflow: hidden;
  margin: 0 60px;
}

.slider {
  display: flex;
  gap: 20px;
  transition: transform 0.4s ease;
}

.slider img {
  width: calc((100% - 40px) / 3);
  border-radius: 20px;
}

/* ===== NAV ===== */
.nav {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  width: 60px;
  height: 60px;
  display: flex;
  justify-content: center;
  align-items: center;
  cursor: pointer;
  border: none;
  background: transparent;
}

.nav.left { left: 0; }
.nav.right { right: 0; }

.nav::before {
  content: "";
  position: absolute;
  width: 40px;
  height: 60px;
  background: rgba(255,255,255,0.12);
  border-radius: 18px;
  opacity: 0;
  transition: 0.25s;
}

.nav:hover::before { opacity: 1; }

.nav span {
  font-size: 40px;
  color: rgba(255,255,255,0.6);
}

.nav:hover span { color: white; }
</style>
</head>

<body>

<div class="sidebar">
  <h2>App Store</h2>
  <p>Today</p>
  <p>Games</p>
  <p>Apps</p>
</div>

<div class="main">

<div class="hero">
  <div class="hero-bg" id="heroBg"></div>

  <div class="hero-content">
    <div class="icon">
      <img id="appIcon" src="https://i.ibb.co/G38YxKhh/windows-defender-off.png">
    </div>

    <div class="info">
      <h1 id="appName">Windows Defender</h1>
      <div class="sub">Utility</div>
      <div class="get-btn">GET</div>
    </div>
  </div>
</div>

<div class="preview">

  <button class="nav left" onclick="slide(-1)">
    <span>‹</span>
  </button>

  <div class="slider-wrapper">
    <div class="slider" id="slider">
      <img src="https://i.ibb.co/G38YxKhh/windows-defender-off.png">
      <img src="https://i.ibb.co/G38YxKhh/windows-defender-off.png">
      <img src="https://i.ibb.co/G38YxKhh/windows-defender-off.png">
      <img src="https://i.ibb.co/G38YxKhh/windows-defender-off.png">
      <img src="https://i.ibb.co/G38YxKhh/windows-defender-off.png">
    </div>
  </div>

  <button class="nav right" onclick="slide(1)">
    <span>›</span>
  </button>

</div>

</div>

<script>
let index = 0;

function updateNav() {
  const left = document.querySelector(".nav.left");
  const right = document.querySelector(".nav.right");
  const total = document.getElementById("slider").children.length;

  left.style.display = index === 0 ? "none" : "flex";
  right.style.display = index >= total - 3 ? "none" : "flex";
}

function slide(dir) {
  const slider = document.getElementById("slider");
  const total = slider.children.length;

  index += dir;

  if (index < 0) index = 0;
  if (index > total - 3) index = total - 3;

  const w = slider.children[0].offsetWidth + 20;
  slider.style.transform = `translateX(-${index * w}px)`;

  updateNav();
}

updateNav();
</script>

</body>
</html>
