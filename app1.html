```html
<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>App Store Style</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #000;
  color: white;
  display: flex;
}

/* ===== SIDEBAR ===== */
.sidebar {
  width: 230px;
  background: #0b0b0b;
  padding: 20px;
  height: 100vh;
}

.sidebar h2 { font-size: 16px; }
.sidebar p { color: #aaa; margin: 12px 0; }

/* ===== MAIN ===== */
.main {
  flex: 1;
  overflow-y: auto;
}

/* ===== HERO ===== */
.hero {
  position: relative;
  padding: 40px 45px;
  overflow: hidden;
  height: 200px;

  background: radial-gradient(
    ellipse at center,
    #0a0a0a 0%,
    #000 70%
  );
}

/* ===== BLUR NỀN ===== */
.hero-bg {
  position: absolute;
  inset: 0;
  background-size: cover;
  background-position: center;

  filter: blur(120px) saturate(180%) brightness(1.2);
  transform: scale(1.8);
  opacity: 0.9;

  -webkit-mask-image: radial-gradient(
    ellipse at center,
    black 45%,
    rgba(0,0,0,0.5) 65%,
    transparent 90%
  );
  mask-image: radial-gradient(
    ellipse at center,
    black 45%,
    rgba(0,0,0,0.5) 65%,
    transparent 90%
  );
}

/* overlay */
.hero::before {
  content: "";
  position: absolute;
  inset: 0;

  background: linear-gradient(
    to right,
    rgba(0,0,0,0.5),
    rgba(0,0,0,0.15),
    rgba(0,0,0,0.05),
    rgba(0,0,0,0.2),
    rgba(0,0,0,0.5)
  );

  z-index: 1;
}

/* ánh sáng */
.hero::after {
  content: "";
  position: absolute;
  inset: 0;

  background: radial-gradient(
    circle at 32% 50%,
    rgba(255,255,255,0.22),
    rgba(255,255,255,0.1) 30%,
    transparent 65%
  );

  z-index: 1;
}

/* ===== CONTENT ===== */
.hero-content {
  position: relative;
  z-index: 2;

  display: flex;
  align-items: center;
  gap: 40px;
  height: 100%;
}

/* ===== ICON ===== */
.icon {
  width: 200px;
  height: 200px;
  border-radius: 40px;
  position: relative;
  overflow: hidden;
  background: #000;

  box-shadow:
    0 25px 60px rgba(0,0,0,0.6),
    0 0 20px rgba(255,255,255,0.05);
}

.icon img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.icon::before {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: 40px;

  background: linear-gradient(
    145deg,
    rgba(255,255,255,0.35),
    transparent 40%,
    rgba(255,255,255,0.1)
  );
}

.icon::after {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: 40px;

  box-shadow:
    inset 0 0 0 1px rgba(255,255,255,0.5),
    inset 0 2px 6px rgba(255,255,255,0.25),
    inset 0 -3px 8px rgba(0,0,0,0.4);
}

/* ===== TEXT ===== */
.info h1 {
  font-size: 34px;
  margin: 0;
}

.sub {
  color: #bbb;
  margin-top: 6px;
}

.get-btn {
  margin-top: 18px;
  display: inline-block;
  background: #007aff;
  padding: 10px 28px;
  border-radius: 20px;
  font-weight: 600;
}

/* ===== INFO BAR ===== */
.info-bar {
  display: flex;
  gap: 60px;
  padding: 25px 80px;
  background: #0a0a0a;
  border-top: 1px solid rgba(255,255,255,0.05);
}

/* ===== PREVIEW ===== */
.preview {
  padding: 30px 80px; /* 👈 tạo khoảng trống cho nút */
}

.slider-wrapper {
  position: relative;
  overflow: visible; /* 👈 QUAN TRỌNG */
}

.slider {
  display: flex;
  gap: 20px;
  transition: transform 0.4s ease;
}

.slider img {
  width: calc((100% - 40px) / 3);
  aspect-ratio: 16 / 9;
  border-radius: 20px;
  object-fit: cover;
  flex-shrink: 0;

  box-shadow:
    0 10px 25px rgba(0,0,0,0.5),
    0 0 0 1px rgba(255,255,255,0.05);
}

/* ===== NÚT CHUẨN APP STORE ===== */
.nav {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  z-index: 3;

  width: 34px;
  height: 70px;
  border-radius: 12px;
  border: none;

  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(10px);

  color: white;
  font-size: 20px;
  cursor: pointer;

  display: flex;
  align-items: center;
  justify-content: center;

  opacity: 0;
  transition: all 0.25s ease;
}

/* vị trí ngoài ảnh */
.nav.left {
  left: -50px;
}

.nav.right {
  right: -50px;
}

/* hover mới hiện */
.slider-wrapper:hover .nav {
  opacity: 1;
}

/* hover hiệu ứng */
.nav:hover {
  background: rgba(255,255,255,0.18);
  transform: translateY(-50%) scale(1.05);
}

/* ===== DESC ===== */
.desc {
  padding: 0 80px 40px;
  color: #ccc;
}
</style>
</head>

<body>

<div class="sidebar">
  <h2>App Store</h2>
  <p>Today</p>
  <p>Games</p>
  <p>Apps</p>
</div>

<div class="main">

<div class="hero">
  <div class="hero-bg" id="heroBg"></div>

  <div class="hero-content">
    <div class="icon">
      <img id="appIcon" src="https://i.ibb.co/G38YxKhh/windows-defender-off.png">
    </div>

    <div class="info">
      <h1 id="appName">Windows Defender</h1>
      <div class="sub">Utility</div>
      <div class="sub">Free</div>
      <div class="get-btn">GET</div>
    </div>
  </div>
</div>

<div class="info-bar"></div>

<div class="preview">
  <div class="slider-wrapper">

    <button class="nav left" onclick="slide(-1)">❮</button>

    <div class="slider" id="slider">
      <img src="https://i.ibb.co/G38YxKhh/windows-defender-off.png">
      <img src="https://i.ibb.co/G38YxKhh/windows-defender-off.png">
      <img src="https://i.ibb.co/G38YxKhh/windows-defender-off.png">
      <img src="https://i.ibb.co/G38YxKhh/windows-defender-off.png">
      <img src="https://i.ibb.co/G38YxKhh/windows-defender-off.png">
    </div>

    <button class="nav right" onclick="slide(1)">❯</button>

  </div>
</div>

</div>

<script>
let index = 0;

function slide(direction) {
  const slider = document.getElementById("slider");
  const total = slider.children.length;

  index += direction;

  if (index < 0) index = 0;
  if (index > total - 3) index = total - 3;

  const width = slider.children[0].offsetWidth + 20;
  slider.style.transform = `translateX(-${index * width}px)`;
}
</script>

</body>
</html>
