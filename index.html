<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>App Store</title>

<link rel="icon" type="image/png" href="https://i.ibb.co/GQ0SR6P7/b8b6fd228823037-Y3-Jvc-Cwy-Nj-Aw-LDIw-Mz-Qs-MTgw-LDgx-MQ.png">

<style>

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #000;
  color: white;
  display: flex;
}

/* ===== FACE ID LOADER ===== */

#loader {
  position: fixed;
  inset: 0;
  background: #000;
  z-index: 999999;

  display: flex;
  justify-content: center;
  align-items: center;

  transition:
    opacity 0.7s ease,
    visibility 0.7s ease;
}

.face-container {
  position: relative;
  width: 220px;
  height: 220px;

  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}

.face-ring {
  position: absolute;

  width: 170px;
  height: 170px;

  border-radius: 50%;
  border: 2px solid rgba(255,255,255,0.12);

  box-shadow:
    0 0 40px rgba(0,140,255,0.15),
    inset 0 0 20px rgba(255,255,255,0.03);
}

.face-icon {
  width: 110px;
  height: 110px;

  stroke: #4da3ff;
  stroke-width: 4;
  fill: none;

  z-index: 2;

  filter: drop-shadow(0 0 12px rgba(77,163,255,0.5));
}

.face-icon circle {
  fill: #4da3ff;
}

.scan-line {
  position: absolute;

  width: 120px;
  height: 4px;

  background: linear-gradient(
    90deg,
    transparent,
    #4da3ff,
    transparent
  );

  border-radius: 999px;

  box-shadow:
    0 0 20px #4da3ff;

  animation: scan 2s ease-in-out infinite;
}

@keyframes scan {

  0% {
    transform: translateY(-55px);
    opacity: 0;
  }

  15% {
    opacity: 1;
  }

  50% {
    transform: translateY(55px);
    opacity: 1;
  }

  100% {
    transform: translateY(-55px);
    opacity: 0;
  }
}

.loader-text {
  position: absolute;
  bottom: -20px;

  font-size: 15px;
  letter-spacing: 1px;

  color: rgba(255,255,255,0.7);
}

.success-check {

  position: absolute;

  font-size: 90px;
  font-weight: bold;

  color: #00ff88;

  opacity: 0;
  transform: scale(0.5);

  transition: all 0.5s ease;

  text-shadow:
    0 0 25px rgba(0,255,136,0.7);
}

.success .success-check {
  opacity: 1;
  transform: scale(1);
}

.success .face-icon,
.success .scan-line,
.success .loader-text {
  opacity: 0;
  transition: 0.4s;
}

/* SIDEBAR */

.sidebar {
  width: 240px;
  background: #0d0d0d;
  padding: 20px;
  height: 100vh;
}

.search {
  width: 100%;
  padding: 10px;
  border-radius: 10px;
  border: none;
  background: #1a1a1a;
  color: white;
  margin: 16px 0;
}

.menu a {
  display: block;
  padding: 10px;
  border-radius: 12px;
  color: #aaa;
  text-decoration: none;
  margin-bottom: 6px;
}

.menu a:hover {
  background: #1f1f1f;
  color: white;
}

/* MAIN */

.main {
  flex: 1;
  padding: 40px 50px;
}

.header-title {
  font-size: 30px;
  font-weight: 600;
  margin-bottom: 30px;
}

/* TODAY */

.today {
  display: flex;
  gap: 28px;
  margin-bottom: 45px;
}

.big-card {
  flex: 2.8;
  height: 460px;
  border-radius: 28px;
  overflow: hidden;
  position: relative;
}

.small-card {
  flex: 0.9;
  height: 460px;
  border-radius: 28px;
  position: relative;
}

/* VIDEO WRAPPER */

.video-wrapper {
  width: 100%;
  height: 100%;
  position: relative;
}

.preview {
  position: absolute;
  width: 100%;
  height: 100%;
  object-fit: cover;
  z-index: 2;
  transition: opacity 0.6s ease;
}

.card-img {
  position: absolute;
  width: 100%;
  height: 100%;
  object-fit: cover;
  border-radius: 28px;
}

.preview {
  z-index: 2;
}

video {
  z-index: 1;
}

/* overlay */

.overlay {
  position: absolute;
  top: 0;
  padding: 26px;
  z-index: 3;
}

.overlay span {
  font-size: 12px;
  opacity: 0.7;
  letter-spacing: 1px;
}

.overlay h1 {
  font-size: 30px;
  margin: 8px 0;
}

.overlay h2 {
  font-size: 22px;
}

.overlay p {
  font-size: 14px;
  opacity: 0.8;
}

/* bottom */

.bottom-bar {
  position: absolute;
  bottom: -10px;
  width: 100%;
  padding: 10px 16px;
  display: flex;
  justify-content: space-between;
  align-items: center;

  background: linear-gradient(to top, rgba(0,0,0,0.9), rgba(0,0,0,0.4), transparent);
  backdrop-filter: blur(12px);
  z-index: 3;
  border-radius: 0 0 28px 28px;
}

.app-info {
  display: flex;
  gap: 12px;
  align-items: center;
}

.app-info img {
  width: 50px;
  height: 50px;
  border-radius: 14px;
}

.app-name {
  font-size: 14px;
  font-weight: 600;
}

.app-type {
  font-size: 12px;
  opacity: 0.6;
}

.view-btn {
  position: relative;
  padding: 7px 22px;
  border-radius: 999px;

  background: linear-gradient(
    180deg,
    rgba(255,255,255,0.25),
    rgba(255,255,255,0.05)
  );

  border: 1px solid rgba(255,255,255,0.25);

  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);

  color: white;
  font-weight: 600;

  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.5),
    inset 0 -1px 0 rgba(255,255,255,0.05),
    0 4px 18px rgba(0,0,0,0.4);

  cursor: pointer;
  transition: all 0.25s ease;
}

.view-btn::before {
  content: "";
  position: absolute;
  top: 2px;
  left: 6px;
  right: 6px;
  height: 45%;
  border-radius: inherit;

  background: linear-gradient(
    to bottom,
    rgba(255,255,255,0.55),
    transparent
  );

  opacity: 0.25;
  pointer-events: none;
}

.view-btn:hover {
  background: linear-gradient(
    180deg,
    rgba(77,163,255,0.45),
    rgba(77,163,255,0.15)
  );

  color: white;

  box-shadow:
    0 6px 25px rgba(77,163,255,0.35),
    inset 0 1px 0 rgba(255,255,255,0.6);
}

.view-btn:active {
  transform: scale(0.95);
}

</style>
</head>

<body>

<!-- FACE ID LOADER -->

<div id="loader">

  <div class="face-container">

    <div class="face-ring"></div>

    <div class="scan-line"></div>

    <svg class="face-icon" viewBox="0 0 100 100">

      <path d="M30 35 V28 Q30 20 38 20 H45" />
      <path d="M70 35 V28 Q70 20 62 20 H55" />
      <path d="M30 65 V72 Q30 80 38 80 H45" />
      <path d="M70 65 V72 Q70 80 62 80 H55" />

      <circle cx="40" cy="45" r="3"/>
      <circle cx="60" cy="45" r="3"/>

      <path d="M42 60 Q50 66 58 60"/>

    </svg>

    <div class="success-check">✓</div>

    <div class="loader-text">
      Scanning Face ID...
    </div>

  </div>

</div>

<div class="sidebar">
  <h2>📱 App Store</h2>

  <input class="search" placeholder="Search">

  <div class="menu">
    <a href="#">Today</a>
    <a href="#">Games</a>
    <a href="#">Apps</a>
  </div>
</div>

<div class="main">

  <div class="header-title">
    The Biggest Apps and Games
  </div>

</div>

<script>

// FACE ID EFFECT

window.addEventListener("load", () => {

  const loader = document.getElementById("loader");

  setTimeout(() => {

    loader.classList.add("success");

    document.querySelector(".loader-text").innerText =
      "Face ID Verified";

  }, 2600);

  setTimeout(() => {

    loader.style.opacity = "0";
    loader.style.visibility = "hidden";

  }, 4200);

});

</script>

</body>
</html>
