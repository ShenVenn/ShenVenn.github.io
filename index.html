```html
<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>App Store Mini</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #000;
  color: white;
  display: flex;
}

/* ===== SIDEBAR ===== */
.sidebar {
  width: 240px;
  background: #0d0d0d;
  padding: 20px;
  height: 100vh;
}

.search {
  width: 100%;
  padding: 8px;
  border-radius: 8px;
  border: none;
  background: #1a1a1a;
  color: white;
  margin: 15px 0;
}

.menu a {
  display: block;
  padding: 10px;
  border-radius: 10px;
  color: #aaa;
  text-decoration: none;
  margin-bottom: 6px;
}

.menu a:hover {
  background: #1f1f1f;
  color: white;
}

/* ===== MAIN ===== */
.main {
  flex: 1;
  padding: 20px;
}

/* ===== TODAY ===== */
.today {
  display: flex;
  gap: 24px;
  margin-bottom: 30px;
}

.big-card, .small-card {
  position: relative;
  border-radius: 26px;
  overflow: hidden;
}

.big-card { flex: 3; height: 420px; }
.small-card { flex: 1.2; height: 420px; }

.card-img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.overlay {
  position: absolute;
  top: 0;
  padding: 20px;
}

.bottom-bar {
  position: absolute;
  bottom: 0;
  width: 100%;
  padding: 14px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: linear-gradient(to top, rgba(0,0,0,0.7), transparent);
}

.app-info {
  display: flex;
  gap: 10px;
}

.app-info img {
  width: 44px;
  height: 44px;
  border-radius: 12px;
}

.view-btn {
  background: rgba(255,255,255,0.2);
  border: none;
  padding: 6px 16px;
  border-radius: 20px;
  color: white;
}

/* ===== APPS ===== */
.apps-row {
  display: flex;
  gap: 24px;
}

.app-card {
  flex: 1;
  border-radius: 26px;
  padding: 22px;
  height: 420px;
  background: linear-gradient(145deg, #2c2c2e, #1c1c1e);
  display: flex;
  flex-direction: column;
}

.app-card span {
  font-size: 11px;
  opacity: 0.5;
}

.app-card h2 {
  margin: 6px 0;
  font-size: 26px;
}

.app-desc {
  font-size: 13px;
  opacity: 0.5;
  margin-bottom: 10px;
}

.app-list {
  overflow-y: auto;
}

/* scrollbar */
.app-list::-webkit-scrollbar { width: 6px; }
.app-list::-webkit-scrollbar-thumb {
  background: #444;
  border-radius: 10px;
}

.app-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 18px;
}

.app-left {
  display: flex;
  gap: 12px;
  align-items: center;
}

.app-left img {
  width: 54px;
  height: 54px;
  border-radius: 14px;
}

.app-text {
  font-size: 14px;
}

.app-text small {
  display: block;
  opacity: 0.6;
  font-size: 12px;
}

.view-small {
  background: #0a84ff;
  border: none;
  padding: 6px 18px;
  border-radius: 20px;
  color: white;
  font-size: 13px;
}
</style>
</head>

<body>

<div class="sidebar">
  <h2>📱 App Store</h2>
  <input class="search" placeholder="Search">
  <div class="menu">
    <a href="#">Today</a>
    <a href="#">Games</a>
    <a href="#">Apps</a>
  </div>
</div>

<div class="main">

  <!-- TODAY -->
  <div class="today">

    <div class="big-card">
      <img class="card-img" src="https://i.ibb.co/4w1JqgW/game-bg.jpg">
      <div class="overlay">
        <span>QUICK TIP</span>
        <h1>Top Heroes</h1>
      </div>
      <div class="bottom-bar">
        <div class="app-info">
          <img src="https://i.ibb.co/4w1JqgW/game-bg.jpg">
          <div>Game</div>
        </div>
        <button class="view-btn">View</button>
      </div>
    </div>

    <div class="small-card">
      <img class="card-img" src="https://i.ibb.co/3YpZ8GQ/chess.jpg">
      <div class="overlay">
        <span>GAMES</span>
        <h2>Chess</h2>
      </div>
      <div class="bottom-bar">
        <div class="app-info">
          <img src="https://i.ibb.co/3YpZ8GQ/chess.jpg">
          <div>Chess</div>
        </div>
        <button class="view-btn">View</button>
      </div>
    </div>

  </div>

  <!-- APPS -->
  <h2>The Biggest Apps and Games</h2>

  <div class="apps-row">

    <div class="app-card">
      <span>OUR FAVOURITES</span>
      <h2>Top apps this week</h2>
      <div class="app-desc">Discover the best apps</div>

      <div class="app-list">

        <div class="app-item">
          <div class="app-left">
            <img src="https://i.ibb.co/jkZXPC7T/images.png">
            <div class="app-text">
              TikTok
              <small>Short videos</small>
            </div>
          </div>
          <button class="view-small">View</button>
        </div>

        <div class="app-item">
          <div class="app-left">
            <img src="https://i.ibb.co/3YpZ8GQ/chess.jpg">
            <div class="app-text">
              YouTube
              <small>Video & Music</small>
            </div>
          </div>
          <button class="view-small">View</button>
        </div>

      </div>
    </div>

    <div class="app-card">
      <span>ESSENTIALS</span>
      <h2>Vietnam's favourites</h2>

      <div class="app-list">

        <div class="app-item">
          <div class="app-left">
            <img src="https://i.ibb.co/G38YxKhh/windows-defender-off.png">
            <div class="app-text">
              Zalo
              <small>Chat app</small>
            </div>
          </div>
          <button class="view-small">View</button>
        </div>

        <div class="app-item">
          <div class="app-left">
            <img src="https://i.ibb.co/jkZXPC7T/images.png">
            <div class="app-text">
              CapCut
              <small>Editor</small>
            </div>
          </div>
          <button class="view-small">View</button>
        </div>

      </div>
    </div>

  </div>

</div>

</body>
</html>
