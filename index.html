<!DOCTYPE html>
<html>
<head>
  <title>App Store Mini</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #121212;
      color: white;
    }

    .header {
      padding: 20px;
      font-size: 24px;
      font-weight: bold;
      text-align: center;
      background: #1f1f1f;
    }

    .grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      padding: 10px;
    }

    .card {
      width: 150px;
      margin: 10px;
      text-align: center;
      cursor: pointer;
      transition: 0.3s;
    }

    .card:hover {
      transform: scale(1.1);
    }

    .card img {
      width: 100%;
      border-radius: 20px;
    }

    a {
      text-decoration: none;
      color: white;
    }

    .title {
      margin-top: 8px;
      font-size: 14px;
    }
  </style>
</head>

<body>

<div class="header">📱 App Store</div>

<div class="grid">

  <a href="Defender.html">
    <div class="card">
      <img src="https://via.placeholder.com/150">
      <div class="title">App 1</div>
    </div>
  </a>

</div>

</body>
</html>
