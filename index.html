<!DOCTYPE html>
<html>
<head>
  <title>Netflix Mini</title>
  <style>
    body {
      margin: 0;
      background: #141414;
      color: white;
      font-family: Arial;
    }

    .navbar {
      background: black;
      padding: 15px;
      font-size: 24px;
      font-weight: bold;
      color: red;
    }

    .banner {
      padding: 100px 20px;
      background: url('https://images.unsplash.com/photo-1524985069026-dd778a71c7b4') center/cover;
    }

    .banner h1 {
      font-size: 50px;
    }

    .row {
      margin: 20px;
    }

    .row h2 {
      margin-bottom: 10px;
    }

    .movies {
      display: flex;
      overflow-x: auto;
    }

    .movie {
      min-width: 200px;
      margin-right: 10px;
      transition: transform 0.3s;
    }

    .movie img {
      width: 100%;
      border-radius: 10px;
    }

    .movie:hover {
      transform: scale(1.1);
    }
  </style>
</head>

<body>

  <div class="navbar">NETFLIX</div>

  <div class="banner">
    <h1>Phim nổi bật 😎</h1>
    <p>Xem ngay đi anh</p>
  </div>

  <div class="row">
    <h2>🔥 Phổ biến</h2>
    <div class="movies">
      <div class="movie"><img src="https://via.placeholder.com/200x300"></div>
      <div class="movie"><img src="https://via.placeholder.com/200x300"></div>
      <div class="movie"><img src="https://via.placeholder.com/200x300"></div>
      <div class="movie"><img src="https://via.placeholder.com/200x300"></div>
    </div>
  </div>

  <div class="row">
    <h2>🎬 Hành động</h2>
    <div class="movies">
      <div class="movie"><img src="https://via.placeholder.com/200x300"></div>
      <div class="movie"><img src="https://via.placeholder.com/200x300"></div>
      <div class="movie"><img src="https://via.placeholder.com/200x300"></div>
    </div>
  </div>

</body>
</html>
