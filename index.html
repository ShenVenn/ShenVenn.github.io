<!DOCTYPE html>
<html>
<head>
  <title>App Store Mini</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #121212;
      color: white;
    }

    .header {
      padding: 20px;
      font-size: 24px;
      font-weight: bold;
      text-align: center;
      background: #1f1f1f;
    }

    .grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      padding: 20px;
    }

    .card {
      width: 160px;
      margin: 12px;
      text-align: center;
      cursor: pointer;
      transition: 0.3s;
    }

    .card:hover {
      transform: scale(1.08);
    }

    .card img {
      width: 100%;
      border-radius: 20px;
    }

    a {
      text-decoration: none;
      color: white;
    }

    .title {
      margin-top: 8px;
      font-size: 14px;
    }
  </style>
</head>

<body>

<div class="header">📱 App Store</div>

<div class="grid">

  <a href="Defender.html">
    <div class="card">
      <img src="https://i.ibb.co/G38YxKhh/windows-defender-off.png">
      <div class="title">Windows Defender</div>
    </div>
  </a>

  <a href="Activation Win10.html">
    <div class="card">
      <img src="https://i.ibb.co/BVTVspJr/MSFT-Windows-10-Windows-11-bloom-logo-570x570.avif">
      <div class="title">Activation Win10</div>
    </div>
  </a>

  <a href="app3.html">
    <div class="card">
      <img src="https://via.placeholder.com/150/44ff44">
      <div class="title">App 3</div>
    </div>
  </a>

</div>

</body>
</html>
