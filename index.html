<!DOCTYPE html>
<html>
<head>
  <title>Kho App của anh</title>
  <style>
    body {
      background: #111;
      color: white;
      font-family: Arial;
    }

    h1 {
      text-align: center;
    }

    .grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
    }

    .card {
      width: 200px;
      margin: 15px;
      background: #222;
      border-radius: 10px;
      overflow: hidden;
      text-align: center;
      cursor: pointer;
      transition: 0.3s;
    }

    .card:hover {
      transform: scale(1.05);
    }

    .card img {
      width: 100%;
    }

    a {
      text-decoration: none;
      color: white;
    }
  </style>
</head>

<body>

<h1>📱 Kho App</h1>

<div class="grid">

  <a href="app1.html">
    <div class="card">
      <img src="https://via.placeholder.com/200x250">
      <p>App 1</p>
    </div>
  </a>

  <a href="app2.html">
    <div class="card">
      <img src="https://via.placeholder.com/200x250">
      <p>App 2</p>
    </div>
  </a>

</div>

</body>
</html>
