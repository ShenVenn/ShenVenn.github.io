<!DOCTYPE html>
<html lang="vi">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>App Store</title>

<link rel="icon" type="image/png"
href="https://i.ibb.co/GQ0SR6P7/b8b6fd228823037-Y3-Jvc-Cwy-Nj-Aw-LDIw-Mz-Qs-MTgw-LDgx-MQ.png">

<style>

*{
  box-sizing:border-box;
}

body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  background:#000;
  color:white;
  display:flex;
  overflow:hidden;
}

/* =========================
   FACE ID LOADER
========================= */

#loader{
  position:fixed;
  inset:0;
  background:#000;
  z-index:999999;

  display:flex;
  justify-content:center;
  align-items:center;

  transition:
    opacity .7s ease,
    visibility .7s ease;
}

.face-container{
  position:relative;
  width:240px;
  height:240px;

  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

.face-ring{
  position:absolute;

  width:180px;
  height:180px;

  border-radius:50%;
  border:2px solid rgba(255,255,255,.12);

  box-shadow:
    0 0 45px rgba(0,140,255,.18),
    inset 0 0 25px rgba(255,255,255,.03);
}

.face-icon{
  width:120px;
  height:120px;

  stroke:#4da3ff;
  stroke-width:4;
  fill:none;

  z-index:2;

  filter:drop-shadow(0 0 14px rgba(77,163,255,.55));
}

.face-icon circle{
  fill:#4da3ff;
}

.scan-line{
  position:absolute;

  width:135px;
  height:4px;

  background:linear-gradient(
    90deg,
    transparent,
    #4da3ff,
    transparent
  );

  border-radius:999px;

  box-shadow:0 0 20px #4da3ff;

  animation:scan 2s ease-in-out infinite;
}

@keyframes scan{

  0%{
    transform:translateY(-60px);
    opacity:0;
  }

  15%{
    opacity:1;
  }

  50%{
    transform:translateY(60px);
    opacity:1;
  }

  100%{
    transform:translateY(-60px);
    opacity:0;
  }
}

.loader-text{
  position:absolute;
  bottom:-28px;

  font-size:15px;
  letter-spacing:1px;

  color:rgba(255,255,255,.7);
}

.success-check{

  position:absolute;

  font-size:95px;
  font-weight:bold;

  color:#00ff88;

  opacity:0;
  transform:scale(.5);

  transition:all .5s ease;

  text-shadow:
    0 0 25px rgba(0,255,136,.7);
}

.success .success-check{
  opacity:1;
  transform:scale(1);
}

.success .face-icon,
.success .scan-line,
.success .loader-text{
  opacity:0;
  transition:.4s;
}

/* =========================
   SIDEBAR
========================= */

.sidebar{
  width:240px;
  background:#0d0d0d;
  padding:20px;
  height:100vh;
}

.search{
  width:100%;
  padding:10px;
  border-radius:10px;
  border:none;
  background:#1a1a1a;
  color:white;
  margin:16px 0;
}

.menu a{
  display:block;
  padding:10px;
  border-radius:12px;
  color:#aaa;
  text-decoration:none;
  margin-bottom:6px;
}

.menu a:hover{
  background:#1f1f1f;
  color:white;
}

/* =========================
   MAIN
========================= */

.main{
  flex:1;
  padding:40px 50px;
  overflow:auto;
}

.header-title{
  font-size:30px;
  font-weight:600;
  margin-bottom:30px;
}

/* =========================
   TODAY
========================= */

.today{
  display:flex;
  gap:28px;
  margin-bottom:45px;
}

.big-card{
  flex:2.8;
  height:460px;
  border-radius:28px;
  overflow:hidden;
  position:relative;
}

.small-card{
  flex:.9;
  height:460px;
  border-radius:28px;
  position:relative;
}

.video-wrapper{
  width:100%;
  height:100%;
  position:relative;
}

.preview{
  position:absolute;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:2;
  transition:opacity .6s ease;
}

.card-img{
  position:absolute;
  width:100%;
  height:100%;
  object-fit:cover;
  border-radius:28px;
}

video{
  z-index:1;
}

/* =========================
   OVERLAY
========================= */

.overlay{
  position:absolute;
  top:0;
  padding:26px;
  z-index:3;
}

.overlay span{
  font-size:12px;
  opacity:.7;
  letter-spacing:1px;
}

.overlay h1{
  font-size:30px;
  margin:8px 0;
}

.overlay h2{
  font-size:22px;
}

.overlay p{
  font-size:14px;
  opacity:.8;
}

/* =========================
   BOTTOM BAR
========================= */

.bottom-bar{
  position:absolute;
  bottom:-10px;
  width:100%;
  padding:10px 16px;

  display:flex;
  justify-content:space-between;
  align-items:center;

  background:linear-gradient(
    to top,
    rgba(0,0,0,.9),
    rgba(0,0,0,.4),
    transparent
  );

  backdrop-filter:blur(12px);

  z-index:3;

  border-radius:0 0 28px 28px;
}

.app-info{
  display:flex;
  gap:12px;
  align-items:center;
}

.app-info img{
  width:50px;
  height:50px;
  border-radius:14px;
}

.app-name{
  font-size:14px;
  font-weight:600;
}

.app-type{
  font-size:12px;
  opacity:.6;
}

/* =========================
   BUTTON
========================= */

.view-btn,
.view-small{

  position:relative;

  padding:7px 22px;

  border-radius:999px;

  background:linear-gradient(
    180deg,
    rgba(255,255,255,.25),
    rgba(255,255,255,.05)
  );

  border:1px solid rgba(255,255,255,.25);

  backdrop-filter:blur(16px);
  -webkit-backdrop-filter:blur(16px);

  color:white;
  font-weight:600;

  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.5),
    inset 0 -1px 0 rgba(255,255,255,.05),
    0 4px 18px rgba(0,0,0,.4);

  cursor:pointer;
  transition:all .25s ease;
}

.view-btn::before,
.view-small::before{
  content:"";

  position:absolute;

  top:2px;
  left:6px;
  right:6px;

  height:45%;

  border-radius:inherit;

  background:linear-gradient(
    to bottom,
    rgba(255,255,255,.55),
    transparent
  );

  opacity:.25;
  pointer-events:none;
}

.view-btn:hover,
.view-small:hover{

  background:linear-gradient(
    180deg,
    rgba(77,163,255,.45),
    rgba(77,163,255,.15)
  );

  box-shadow:
    0 6px 25px rgba(77,163,255,.35),
    inset 0 1px 0 rgba(255,255,255,.6);
}

.view-btn:active,
.view-small:active{
  transform:scale(.95);
}

/* =========================
   APPS
========================= */

.apps-row{
  display:flex;
  gap:28px;
}

.app-card{
  border-radius:30px;
  padding:26px;
  height:560px;

  background:linear-gradient(
    145deg,
    #2c2c2e,
    #1c1c1e
  );

  box-shadow:0 20px 40px rgba(0,0,0,.6);

  display:flex;
  flex-direction:column;
}

.left-card{
  flex:.6;
}

.right-card{
  flex:2;
}

.app-card span{
  font-size:12px;
  opacity:.5;
}

.app-card h2{
  margin:8px 0;
}

.app-desc{
  font-size:14px;
  opacity:.6;
  margin-bottom:18px;
}

.app-list{
  overflow-y:auto;
}

.app-list::-webkit-scrollbar{
  display:none;
}

/* =========================
   ITEM
========================= */

.app-item{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:14px 0;

  border-bottom:
  1px solid rgba(255,255,255,.05);
}

.app-left{
  display:flex;
  gap:14px;
  align-items:center;
}

.app-left img{
  width:64px;
  height:64px;
  border-radius:16px;
}

.right-card .view-small{
  margin-right:20px;
}

</style>
</head>

<body>

<!-- =========================
     FACE ID LOADER
========================= -->

<div id="loader">

  <div class="face-container">

    <div class="face-ring"></div>

    <div class="scan-line"></div>

    <svg class="face-icon" viewBox="0 0 100 100">

      <path d="M30 35 V28 Q30 20 38 20 H45"/>
      <path d="M70 35 V28 Q70 20 62 20 H55"/>
      <path d="M30 65 V72 Q30 80 38 80 H45"/>
      <path d="M70 65 V72 Q70 80 62 80 H55"/>

      <circle cx="40" cy="45" r="3"/>
      <circle cx="60" cy="45" r="3"/>

      <path d="M42 60 Q50 66 58 60"/>

    </svg>

    <div class="success-check">✓</div>

    <div class="loader-text">
      Scanning Face ID...
    </div>

  </div>

</div>

<!-- =========================
     SIDEBAR
========================= -->

<div class="sidebar">

  <h2>📱 App Store</h2>

  <input class="search" placeholder="Search">

  <div class="menu">
    <a href="#">Today</a>
    <a href="#">Games</a>
    <a href="#">Apps</a>
  </div>

</div>

<!-- =========================
     MAIN
========================= -->

<div class="main">

  <div class="header-title">
    The Biggest Apps and Games
  </div>

  <!-- TODAY -->

  <div class="today">

    <!-- BIG -->

    <div class="big-card">

      <div class="video-wrapper">

        <img class="preview"
        src="https://i.ibb.co/Y7m9kyr1/Screenshot-2026-03-19-230214.png">

        <video id="mainVideo"
        class="card-img"
        autoplay
        muted
        loop
        playsinline
        preload="auto">

          <source
          src="https://raw.githubusercontent.com/ShenVenn/app-store-assets/main/332701_medium.mp4"
          type="video/mp4">

        </video>

      </div>

      <div class="overlay">

        <span>APP STORE EXCLUSIVE</span>

        <h1>
          Under the hood of Arknights
        </h1>

        <p>
          Behind the scenes with developers.
        </p>

      </div>

      <div class="bottom-bar">

        <div class="app-info">

          <img
          src="https://cdn-icons-png.flaticon.com/512/5968/5968705.png">

          <div>

            <div class="app-name">
              Arknights
            </div>

            <div class="app-type">
              Role-Playing
            </div>

          </div>

        </div>

        <button class="view-btn">
          View
        </button>

      </div>

    </div>

    <!-- SMALL -->

    <div class="small-card">

      <img class="card-img"
      src="https://i.ibb.co/rRW5tFd7/lossless-scaling-cdkeys.webp">

      <div class="overlay">

        <span>QUICK TIP</span>

        <h2>Top Heroes</h2>

        <p>Build your kingdom.</p>

      </div>

      <div class="bottom-bar">

        <div class="app-info">

          <img
          src="https://i.ibb.co/sJdNzCJ1/images-2.png">

          <div>

            <div class="app-name">
              LossLess Scaling
            </div>

            <div class="app-type">
              Tăng FPS + Graphics
            </div>

          </div>

        </div>

        <button class="view-btn">
          View
        </button>

      </div>

    </div>

  </div>

</div>

<script>

/* =========================
   FACE ID EFFECT
========================= */

window.addEventListener("load",()=>{

  const loader =
  document.getElementById("loader");

  setTimeout(()=>{

    loader.classList.add("success");

    document.querySelector(".loader-text")
    .innerText = "Face ID Verified";

  },2600);

  setTimeout(()=>{

    loader.style.opacity = "0";
    loader.style.visibility = "hidden";

  },4200);

});

/* =========================
   VIDEO FADE
========================= */

const video =
document.getElementById("mainVideo");

const preview =
document.querySelector(".preview");

video.addEventListener("loadeddata",()=>{

  preview.style.opacity = "0";

  setTimeout(()=>{
    preview.style.display = "none";
  },600);

});

</script>

</body>
</html>
