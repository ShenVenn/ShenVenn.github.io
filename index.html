<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>App Store Mini</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #000;
  color: white;
  display: flex;
}

/* ===== SIDEBAR ===== */
.sidebar {
  width: 240px;
  background: #0d0d0d;
  padding: 20px;
  height: 100vh;
  box-sizing: border-box;
}

.sidebar h2 {
  font-size: 18px;
  margin-bottom: 10px;
}

.search {
  width: 100%;
  padding: 8px;
  border-radius: 8px;
  border: none;
  background: #1a1a1a;
  color: white;
  margin-bottom: 20px;
}

.menu a {
  display: block;
  padding: 10px;
  border-radius: 10px;
  color: #aaa;
  text-decoration: none;
  margin-bottom: 6px;
}

.menu a:hover {
  background: #1f1f1f;
  color: white;
}

/* ===== MAIN ===== */
.main {
  flex: 1;
  padding: 20px;
}

/* ===== TODAY LAYOUT ===== */
.today {
  display: flex;
  gap: 20px;
  margin-bottom: 30px;
}

/* CARD CHUNG */
.big-card, .small-card {
  position: relative;
  border-radius: 24px;
  overflow: hidden;
  cursor: pointer;
}

.big-card {
  flex: 2;
  height: 220px;
}

.small-card {
  flex: 1;
  height: 220px;
}

.card-img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* TEXT OVERLAY */
.overlay {
  position: absolute;
  bottom: 0;
  width: 100%;
  padding: 20px;
  background: linear-gradient(to top, rgba(0,0,0,0.7), transparent);
}

.overlay h3 {
  margin: 0;
  font-size: 20px;
}

.overlay p {
  margin: 5px 0 0;
  font-size: 13px;
  opacity: 0.8;
}

/* ===== SECTION ===== */
.section {
  margin-top: 20px;
}

.section h2 {
  margin-bottom: 15px;
}

/* GRID */
.grid {
  display: flex;
  flex-wrap: wrap;
}

.card {
  width: 150px;
  margin: 10px;
  cursor: pointer;
  transition: 0.3s;
}

.card:hover {
  transform: scale(1.08);
}

.card img {
  width: 100%;
  border-radius: 18px;
}

.title {
  margin-top: 6px;
  font-size: 13px;
}

a {
  text-decoration: none;
  color: white;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <h2>📱 App Store</h2>
  <input class="search" placeholder="Search">

  <div class="menu">
    <a href="#">Today</a>
    <a href="#">Games</a>
    <a href="#">Apps</a>
    <a href="#">Arcade</a>
  </div>
</div>

<!-- MAIN -->
<div class="main">

  <!-- TODAY -->
  <div class="today">

    <!-- CARD TO -->
    <div class="big-card">
      <img class="card-img" src="https://i.ibb.co/4w1JqgW/game-bg.jpg">
      <div class="overlay">
        <h3>Top Heroes: Kingdom Saga</h3>
        <p>Go for glory</p>
      </div>
    </div>

    <!-- CARD NHỎ -->
    <div class="small-card">
      <img class="card-img" src="https://i.ibb.co/3YpZ8GQ/chess.jpg">
      <div class="overlay">
        <h3>Chess - Play & Learn</h3>
        <p>Train your brain</p>
      </div>
    </div>

  </div>

  <!-- SECTION -->
  <div class="section">
    <h2>Top apps this week</h2>

    <div class="grid">

      <a href="Defender.html">
        <div class="card">
          <img src="https://i.ibb.co/G38YxKhh/windows-defender-off.png">
          <div class="title">Windows Defender</div>
        </div>
      </a>

      <a href="Activation Win10.html">
        <div class="card">
          <img src="https://i.ibb.co/KjLQK29w/So-sanh-windows-10-voi-windows-11.png">
          <div class="title">Activation Win10</div>
        </div>
      </a>

      <a href="Everything.html">
        <div class="card">
          <img src="https://i.ibb.co/jkZXPC7T/images.png">
          <div class="title">Everything</div>
        </div>
      </a>

    </div>
  </div>

</div>

</body>
</html>
